<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Running Shahbaz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Arial', sans-serif;
            touch-action: manipulation;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
        }
        #player {
            position: absolute;
            width: 100px;
            height: 100px;
            left: 80px;
            background-image: url('shahbaz_flying.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 10;
        }
        .hurdle {
            position: absolute;
            width: 120px;
            height: 100%;
            background-image: url('imran_khan_tall.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center bottom;
            z-index: 5;
        }
        .hurdle-gap {
            position: absolute;
            width: 120px;
            height: 200px;
            background: transparent;
            z-index: 4;
        }
        #intro-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
            text-align: center;
        }
        .vs-container {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .circle-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid white;
            background-size: cover;
            background-position: center;
        }
        .vs-text {
            font-size: 48px;
            font-weight: bold;
            color: #ff4500;
            text-shadow: 2px 2px 4px #000;
        }
        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 95;
            color: white;
        }
        .loading-text {
            font-size: 24px;
            margin-bottom: 20px;
        }
        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #score-board {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 4px #000;
            z-index: 50;
        }
        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 110;
            color: white;
        }
        .game-over-img {
            width: 250px;
            height: auto;
            margin-bottom: 20px;
            border: 5px solid #fff;
            border-radius: 10px;
        }
        button {
            padding: 15px 30px;
            font-size: 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="score-board">Stolen Dollars: $0</div>
    <div id="player"></div>

    <div id="intro-screen">
        <h1>Running Shahbaz</h1>
        <div class="vs-container">
            <div class="circle-img" style="background-image: url('shahbaz_flying.png');"></div>
            <div class="vs-text">VS</div>
            <div class="circle-img" style="background-image: url('imran_khan_tall.png');"></div>
        </div>
        <p>Press Space or Tap to Fly!</p>
        <button onclick="startGame()">Start Game</button>
    </div>

    <div id="loading-screen">
        <div class="loading-text">Get Ready...</div>
        <div class="loading-spinner"></div>
    </div>

    <div id="game-over-screen">
        <h1 id="game-over-title">GAME OVER</h1>
        <img id="game-over-pic" class="game-over-img" src="" alt="Game Over">
        <p id="final-score" style="margin-top: 20px; font-size: 28px;">Stolen Dollars: $0</p>
        <button onclick="restartGame()" style="margin-top: 30px;">Try Again</button>
    </div>
</div>

<script>
    const player = document.getElementById('player');
    const gameContainer = document.getElementById('game-container');
    const scoreBoard = document.getElementById('score-board');
    const introScreen = document.getElementById('intro-screen');
    const loadingScreen = document.getElementById('loading-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    const gameOverPic = document.getElementById('game-over-pic');
    const finalScoreTxt = document.getElementById('final-score');

    // Audio assets
    const sounds = {
        dang: new Audio('dang.mp3'),
        mathy: new Audio('mathy rang dyan ga.mp3'),
        jump: new Audio('oooo.mp3'),
        pass: new Audio('Besharam admi.mp3'),
        fail: new Audio('Tmary baap ka pesa he.mp3'),
        khatakar: new Audio('me khatakar insan hn.mp3'),
        hye_allah: new Audio('hye Allah.mp3'),
        bgm: new Audio('funny_bgm.mp3')
    };
    sounds.bgm.loop = true;

    let score = 0;
    let gameActive = false;
    let hurdles = [];
    let animationId;
    let playerY = window.innerHeight / 2;
    let playerVelocity = 0;
    let gravity = 0.4;
    let flapPower = -8;
    let isFlying = false;

    function startGame() {
        introScreen.style.display = 'none';
        loadingScreen.style.display = 'flex';
        
        // Intro sequence with loading
        sounds.dang.play();
        
        setTimeout(() => {
            sounds.mathy.play();
        }, 1500);

        setTimeout(() => {
            loadingScreen.style.display = 'none';
            gameActive = true;
            score = 0;
            playerY = window.innerHeight / 2;
            playerVelocity = 0;
            updateScore();
            sounds.bgm.play();
            spawnHurdle();
            gameLoop();
        }, 4000);
    }

    function flap() {
        if (gameActive) {
            playerVelocity = flapPower;
            sounds.jump.play();
            isFlying = true;
        }
    }

    function updateScore() {
        scoreBoard.innerText = `Stolen Dollars: $${score}`;
    }

    function spawnHurdle() {
        if (!gameActive) return;

        const hurdle = document.createElement('div');
        hurdle.classList.add('hurdle');
        
        hurdle.style.left = window.innerWidth + 'px';
        hurdle.style.top = '0';

        gameContainer.appendChild(hurdle);
        
        // Random gap position
        const gapSize = 200;
        const minGapY = 100;
        const maxGapY = window.innerHeight - gapSize - 100;
        const gapY = minGapY + Math.random() * (maxGapY - minGapY);

        hurdles.push({
            el: hurdle,
            x: window.innerWidth,
            gapY: gapY,
            gapSize: gapSize,
            passed: false
        });

        const nextSpawn = 2500 + Math.random() * 1500;
        setTimeout(spawnHurdle, nextSpawn);
    }

    function gameLoop() {
        if (!gameActive) return;

        // Apply gravity
        playerVelocity += gravity;
        playerY += playerVelocity;

        // Boundaries
        if (playerY < 0) {
            playerY = 0;
            playerVelocity = 0;
        }
        if (playerY + 100 > window.innerHeight) {
            endGame();
            return;
        }

        player.style.top = playerY + 'px';

        // Move hurdles
        for (let i = hurdles.length - 1; i >= 0; i--) {
            const h = hurdles[i];
            h.x -= 5 + (score / 100);
            h.el.style.left = h.x + 'px';

            // Check if passed
            if (!h.passed && h.x < 80) {
                h.passed = true;
                score += 10;
                updateScore();
                sounds.pass.play();
            }

            // Collision detection
            const playerLeft = 80;
            const playerRight = 80 + 100;
            const playerTop = playerY;
            const playerBottom = playerY + 100;

            const hurdleLeft = h.x;
            const hurdleRight = h.x + 120;
            const gapTop = h.gapY;
            const gapBottom = h.gapY + h.gapSize;

            // Check if player is in the hurdle area
            if (playerRight > hurdleLeft && playerLeft < hurdleRight) {
                // Check if player is NOT in the gap
                if (playerTop < gapTop || playerBottom > gapBottom) {
                    endGame();
                    return;
                }
            }

            // Remove off-screen hurdles
            if (h.x < -150) {
                gameContainer.removeChild(h.el);
                hurdles.splice(i, 1);
            }
        }

        animationId = requestAnimationFrame(gameLoop);
    }

    function endGame() {
        gameActive = false;
        cancelAnimationFrame(animationId);
        sounds.bgm.pause();
        sounds.fail.play();
        
        setTimeout(() => {
            gameOverScreen.style.display = 'flex';
            finalScoreTxt.innerText = `Stolen Dollars: $${score}`;
            
            // Show pic4 first
            gameOverPic.src = 'pic4.jpg';
            sounds.khatakar.play();
            
            // After khatakar sound finishes, show pic3 and play hye Allah sound
            setTimeout(() => {
                gameOverPic.src = 'pic3.jpeg';
                sounds.hye_allah = new Audio('hye Allah.mp3');
                sounds.hye_allah.play();
            }, 4500);
        }, 800);
    }

    function restartGame() {
        // Clear existing hurdles
        hurdles.forEach(h => {
            if (gameContainer.contains(h.el)) {
                gameContainer.removeChild(h.el);
            }
        });
        hurdles = [];
        playerY = window.innerHeight / 2;
        playerVelocity = 0;
        sounds.bgm.pause();
        sounds.bgm.currentTime = 0;
        gameOverScreen.style.display = 'none';
        startGame();
    }

    // Controls - Continuous flapping
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            e.preventDefault();
            flap();
        }
    });
    window.addEventListener('touchstart', (e) => {
        e.preventDefault();
        flap();
    });
    window.addEventListener('mousedown', flap);

</script>
</body>
</html>
