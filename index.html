<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Running Shahbaz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Arial', sans-serif;
            touch-action: manipulation;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
        }
        #player {
            position: absolute;
            width: 100px;
            height: 100px;
            left: 80px;
            background-image: url('shahbaz_flying.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 10;
        }
        .hurdle {
            position: absolute;
            width: 140px;
            height: 100%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 5;
        }
        #intro-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
            text-align: center;
        }
        .vs-container {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .circle-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid white;
            background-size: cover;
            background-position: center;
        }
        .vs-text {
            font-size: 48px;
            font-weight: bold;
            color: #ff4500;
            text-shadow: 2px 2px 4px #000;
        }
        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 95;
            color: white;
        }
        .loading-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }
        .loading-images {
            display: flex;
            gap: 30px;
            align-items: center;
        }
        .loading-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid white;
            background-size: cover;
            background-position: center;
        }
        .loading-vs {
            font-size: 36px;
            font-weight: bold;
            color: #ff4500;
        }
        .loading-text {
            font-size: 24px;
            margin-bottom: 20px;
        }
        .countdown {
            font-size: 72px;
            font-weight: bold;
            color: #ffff00;
            text-shadow: 2px 2px 8px #000;
            min-width: 100px;
            text-align: center;
        }
        #score-board {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 4px #000;
            z-index: 50;
        }
        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 110;
            color: white;
        }
        .game-over-img {
            width: 250px;
            height: auto;
            margin-bottom: 20px;
            border: 5px solid #fff;
            border-radius: 10px;
        }
        button {
            padding: 15px 30px;
            font-size: 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="score-board">Stolen Dollars: $0</div>
    <div id="player"></div>

    <div id="intro-screen">
        <h1>Running Shahbaz</h1>
        <div class="vs-container">
            <div class="circle-img" style="background-image: url('shahbaz_flying.png');"></div>
            <div class="vs-text">VS</div>
            <div class="circle-img" style="background-image: url('imran_khan_tall.png');"></div>
        </div>
        <p>Press Space or Tap to Fly!</p>
        <button onclick="startGame()">Start Game</button>
    </div>

    <div id="loading-screen">
        <div class="loading-content">
            <div class="loading-images">
                <div class="loading-img" style="background-image: url('shahbaz_flying.png');"></div>
                <div class="loading-vs">VS</div>
                <div class="loading-img" style="background-image: url('imran_khan_tall.png');"></div>
            </div>
            <div class="loading-text">Keep pressing the jump button to avoid falling!</div>
            <div class="countdown" id="countdown">3</div>
        </div>
    </div>

    <div id="game-over-screen">
        <h1 id="game-over-title">GAME OVER</h1>
        <img id="game-over-pic" class="game-over-img" src="" alt="Game Over">
        <p id="final-score" style="margin-top: 20px; font-size: 28px;">Stolen Dollars: $0</p>
        <button id="restart-btn" onclick="restartGame()" style="margin-top: 30px; display: none;">Try Again</button>
    </div>
</div>

<script>
    const player = document.getElementById('player');
    const gameContainer = document.getElementById('game-container');
    const scoreBoard = document.getElementById('score-board');
    const introScreen = document.getElementById('intro-screen');
    const loadingScreen = document.getElementById('loading-screen');
    const countdownEl = document.getElementById('countdown');
    const gameOverScreen = document.getElementById('game-over-screen');
    const gameOverPic = document.getElementById('game-over-pic');
    const finalScoreTxt = document.getElementById('final-score');
    const restartBtn = document.getElementById('restart-btn');

    // Audio assets
    const sounds = {
        dang: new Audio('dang.mp3'),
        mathy: new Audio('mathy rang dyan ga.mp3'),
        jump: new Audio('oooo.mp3'),
        pass: new Audio('Besharam admi.mp3'),
        fail: new Audio('Tmary baap ka pesa he.mp3'),
        khatakar: new Audio('me khatakar insan hn.mp3'),
        hye_allah: new Audio('hye Allah.mp3'),
        bgm: new Audio('funny_bgm.mp3')
    };
    sounds.bgm.loop = true;

    let score = 0;
    let gameActive = false;
    let hurdles = [];
    let animationId;
    let playerY = window.innerHeight / 2;
    let playerVelocity = 0;
    let gravity = 0.4;
    let flapPower = -8;
    let gameSpeed = 5;
    let speedIncrement = 0.0005;

    // Hurdle image aspect ratio: 768 x 1344
    // In a 140px wide div with background-size: contain
    // Rendered height = 140 * (1344 / 768) = 245px
    const HURDLE_RENDERED_HEIGHT = 140 * (1344 / 768); // ~245px

    // Content bounds within the image (as fractions of image height):
    // imran_khan_tall.png: content from row 140/1344 to 1258/1344
    // imran_khan_tall_sky.png: content from row 40/1344 to 1312/1344
    // We use slightly generous bounds for fair collision detection
    const HURDLE_BODY_TOP_FRAC = 0.08;    // 8% from top of rendered image
    const HURDLE_BODY_BOTTOM_FRAC = 0.96; // 96% from top of rendered image

    function getHurdleCollisionBounds(h) {
        // Returns the actual pixel bounds of the hurdle character on screen
        const screenHeight = window.innerHeight;
        const renderedH = HURDLE_RENDERED_HEIGHT;

        let imgTop, imgBottom;

        if (h.isTopHurdle) {
            // background-position: center top
            // Image top aligns with div top (y=0)
            imgTop = 0;
            imgBottom = renderedH;
        } else {
            // background-position: center bottom
            // Image bottom aligns with div bottom (y=screenHeight)
            imgTop = screenHeight - renderedH;
            imgBottom = screenHeight;
        }

        // Apply body fraction offsets (trim transparent padding)
        const bodyTop = imgTop + renderedH * HURDLE_BODY_TOP_FRAC;
        const bodyBottom = imgTop + renderedH * HURDLE_BODY_BOTTOM_FRAC;

        // Horizontal bounds: image is centered in 140px wide div
        // background-size: contain with 140px width -> image renders at 140px wide
        // Image is centered horizontally in the div
        const hurdleLeft = h.x;
        const hurdleRight = h.x + 140;

        // Add a small horizontal padding to make collision fair
        const hPad = 12;

        return {
            left: hurdleLeft + hPad,
            right: hurdleRight - hPad,
            top: bodyTop,
            bottom: bodyBottom
        };
    }

    function startGame() {
        introScreen.style.display = 'none';
        loadingScreen.style.display = 'flex';
        
        // Intro sequence with loading
        sounds.dang.play();
        
        setTimeout(() => {
            sounds.mathy.play();
        }, 1500);

        // Countdown sequence
        let count = 3;
        countdownEl.textContent = count;
        
        const countdownInterval = setInterval(() => {
            count--;
            if (count > 0) {
                countdownEl.textContent = count;
            } else {
                clearInterval(countdownInterval);
                countdownEl.textContent = 'GO!';
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                    gameActive = true;
                    score = 0;
                    playerY = window.innerHeight / 2;
                    playerVelocity = 0;
                    gameSpeed = 5;
                    updateScore();
                    sounds.bgm.play();
                    spawnHurdle();
                    gameLoop();
                }, 500);
            }
        }, 1000);
    }

    function flap() {
        if (gameActive) {
            playerVelocity = flapPower;
            sounds.jump.play();
        }
    }

    function updateScore() {
        scoreBoard.innerText = `Stolen Dollars: $${score}`;
    }

    function spawnHurdle() {
        if (!gameActive) return;

        const hurdle = document.createElement('div');
        hurdle.classList.add('hurdle');
        
        hurdle.style.left = window.innerWidth + 'px';
        hurdle.style.top = '0';

        // Randomly choose between top and bottom hurdle
        const isTopHurdle = Math.random() > 0.5;
        
        if (isTopHurdle) {
            hurdle.style.backgroundImage = "url('imran_khan_tall_sky.png')";
            hurdle.style.backgroundPosition = 'center top';
        } else {
            hurdle.style.backgroundImage = "url('imran_khan_tall.png')";
            hurdle.style.backgroundPosition = 'center bottom';
        }

        gameContainer.appendChild(hurdle);

        hurdles.push({
            el: hurdle,
            x: window.innerWidth,
            passed: false,
            isTopHurdle: isTopHurdle
        });

        // Spawn next hurdle
        const nextSpawn = 1800 + Math.random() * 800;
        setTimeout(spawnHurdle, nextSpawn);
    }

    function gameLoop() {
        if (!gameActive) return;

        // Apply gravity
        playerVelocity += gravity;
        playerY += playerVelocity;

        // Boundaries
        if (playerY < 0) {
            playerY = 0;
            playerVelocity = 0;
        }
        if (playerY + 100 > window.innerHeight) {
            endGame();
            return;
        }

        player.style.top = playerY + 'px';

        // Increase speed over time
        gameSpeed += speedIncrement;

        // Move hurdles and check collision
        for (let i = hurdles.length - 1; i >= 0; i--) {
            const h = hurdles[i];
            h.x -= gameSpeed;
            h.el.style.left = h.x + 'px';

            // Check if passed (player has cleared the hurdle)
            if (!h.passed && h.x + 140 < 80) {
                h.passed = true;
                score += 10;
                updateScore();
                sounds.pass.play();
            }

            // -------------------------------------------------------
            // FIXED COLLISION DETECTION
            // Use actual visual bounds of the hurdle character image
            // -------------------------------------------------------
            const bounds = getHurdleCollisionBounds(h);

            // Player bounding box (with small padding for fairness)
            const pPad = 12;
            const playerLeft = 80 + pPad;
            const playerRight = 80 + 100 - pPad;
            const playerTop = playerY + pPad;
            const playerBottom = playerY + 100 - pPad;

            // Check horizontal overlap first
            if (playerRight > bounds.left && playerLeft < bounds.right) {
                // Check vertical overlap with the actual character body
                if (playerBottom > bounds.top && playerTop < bounds.bottom) {
                    endGame();
                    return;
                }
            }

            // Remove off-screen hurdles
            if (h.x < -200) {
                if (gameContainer.contains(h.el)) {
                    gameContainer.removeChild(h.el);
                }
                hurdles.splice(i, 1);
            }
        }

        animationId = requestAnimationFrame(gameLoop);
    }

    function endGame() {
        gameActive = false;
        cancelAnimationFrame(animationId);
        sounds.bgm.pause();
        sounds.bgm.currentTime = 0;
        sounds.fail.play();
        
        setTimeout(() => {
            gameOverScreen.style.display = 'flex';
            restartBtn.style.display = 'none';
            finalScoreTxt.innerText = `Stolen Dollars: $${score}`;
            
            // Step 1: Show pic4 and play "me khatakar insan hn" sound
            gameOverPic.src = 'pic4.jpg';

            // Stop any previously playing khatakar/hye_allah sounds
            sounds.khatakar.pause();
            sounds.khatakar.currentTime = 0;
            sounds.hye_allah.pause();
            sounds.hye_allah.currentTime = 0;

            sounds.khatakar.play();
            
            // Step 2: When khatakar sound finishes, switch to pic3 and play "hye Allah" at higher volume
            sounds.khatakar.onended = function() {
                gameOverPic.src = 'pic3.jpeg';
                
                sounds.hye_allah.volume = 1.0; // Full volume (higher level)
                sounds.hye_allah.play();

                // Show the restart button after hye_allah finishes
                sounds.hye_allah.onended = function() {
                    restartBtn.style.display = 'inline-block';
                };
            };

            // Fallback: if sound doesn't fire onended (e.g., blocked), show restart after delay
            setTimeout(() => {
                if (restartBtn.style.display === 'none') {
                    restartBtn.style.display = 'inline-block';
                }
            }, 8000);

        }, 800);
    }

    function restartGame() {
        // Stop and reset all sounds
        sounds.khatakar.pause();
        sounds.khatakar.currentTime = 0;
        sounds.hye_allah.pause();
        sounds.hye_allah.currentTime = 0;
        sounds.fail.pause();
        sounds.fail.currentTime = 0;

        // Clear existing hurdles
        hurdles.forEach(h => {
            if (gameContainer.contains(h.el)) {
                gameContainer.removeChild(h.el);
            }
        });
        hurdles = [];
        playerY = window.innerHeight / 2;
        playerVelocity = 0;
        gameSpeed = 5;
        sounds.bgm.pause();
        sounds.bgm.currentTime = 0;
        gameOverScreen.style.display = 'none';
        startGame();
    }

    // Controls
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            e.preventDefault();
            flap();
        }
    });
    window.addEventListener('touchstart', (e) => {
        e.preventDefault();
        flap();
    });
    window.addEventListener('mousedown', flap);

</script>
</body>
</html>
