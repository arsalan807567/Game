<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Running Shahbaz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Arial', sans-serif;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
            overflow: hidden;
        }
        
        #bg-layer-1 {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('lahore_bg.png');
            background-size: cover;
            background-position: 0 center;
            background-repeat: repeat;
            opacity: 0.8;
            z-index: 1;
        }
        
        #bg-layer-2 {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(255,150,0,0.1) 0%, rgba(255,100,0,0.2) 100%);
            z-index: 2;
        }
        
        #game-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }
        
        #player {
            position: absolute;
            width: 80px;
            height: 100px;
            left: 40px;
            background-image: url('shahbaz_realistic.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 50;
        }
        
        .hurdle {
            position: absolute;
            width: 120px;
            height: 400px;
            background-size: contain;
            background-repeat: no-repeat;
            z-index: 25;
            pointer-events: none;
        }
        
        .hurdle.sky {
            background-position: center top;
        }
        
        .hurdle.ground {
            background-position: center bottom;
        }
        
        #intro-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
            text-align: center;
            padding: 20px;
        }
        
        #intro-screen h1 {
            font-size: clamp(24px, 8vw, 48px);
            margin-bottom: 30px;
        }
        
        .vs-container {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .circle-img {
            width: clamp(80px, 20vw, 120px);
            height: clamp(80px, 20vw, 120px);
            border-radius: 50%;
            border: 4px solid white;
            background-size: cover;
            background-position: center;
        }
        
        .vs-text {
            font-size: clamp(32px, 8vw, 48px);
            font-weight: bold;
            color: #ff4500;
            text-shadow: 2px 2px 4px #000;
        }
        
        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 95;
            color: white;
            padding: 20px;
        }
        
        .loading-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }
        
        .loading-images {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .loading-img {
            width: clamp(60px, 15vw, 100px);
            height: clamp(60px, 15vw, 100px);
            border-radius: 50%;
            border: 3px solid white;
            background-size: cover;
            background-position: center;
        }
        
        .loading-vs {
            font-size: clamp(24px, 6vw, 36px);
            font-weight: bold;
            color: #ff4500;
        }
        
        .loading-text {
            font-size: clamp(16px, 4vw, 24px);
            margin-bottom: 20px;
        }
        
        .countdown {
            font-size: clamp(48px, 12vw, 72px);
            font-weight: bold;
            color: #ffff00;
            text-shadow: 2px 2px 8px #000;
            min-width: 100px;
            text-align: center;
        }
        
        #score-board {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: clamp(16px, 4vw, 24px);
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 4px #000;
            z-index: 50;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 15px;
            border-radius: 5px;
        }
        
        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 110;
            color: white;
            padding: 20px;
        }
        
        #game-over-screen h1 {
            font-size: clamp(28px, 8vw, 48px);
            margin-bottom: 20px;
        }
        
        .game-over-img {
            width: clamp(150px, 40vw, 250px);
            height: auto;
            margin-bottom: 20px;
            border: 5px solid #fff;
            border-radius: 10px;
        }
        
        #final-score {
            margin-top: 20px;
            font-size: clamp(18px, 5vw, 28px);
        }
        
        button {
            padding: clamp(15px, 5vw, 20px) clamp(30px, 8vw, 40px);
            font-size: clamp(18px, 5vw, 24px);
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s, transform 0.1s;
            z-index: 200;
            position: relative;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        
        button:active {
            transform: scale(0.95);
            background: #45a049;
        }
        
        @media (max-width: 768px) {
            #player {
                width: 60px;
                height: 80px;
                left: 30px;
            }
            .hurdle {
                width: 90px;
                height: 300px;
            }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="bg-layer-1"></div>
    <div id="bg-layer-2"></div>
    
    <div id="game-content">
        <div id="score-board">Stolen Dollars: $0</div>
        <div id="player"></div>

        <div id="intro-screen">
            <h1>Running Shahbaz</h1>
            <div class="vs-container">
                <div class="circle-img" style="background-image: url('shahbaz_realistic.png');"></div>
                <div class="vs-text">VS</div>
                <div class="circle-img" style="background-image: url('imran_realistic.png');"></div>
            </div>
            <p style="font-size: clamp(14px, 3vw, 18px); margin-bottom: 20px;">Press Space or Tap to Fly!</p>
            <button id="start-btn">Start Game</button>
        </div>

        <div id="loading-screen">
            <div class="loading-content">
                <div class="loading-images">
                    <div class="loading-img" style="background-image: url('shahbaz_realistic.png');"></div>
                    <div class="loading-vs">VS</div>
                    <div class="loading-img" style="background-image: url('imran_realistic.png');"></div>
                </div>
                <div class="loading-text">Keep pressing the jump button to avoid falling!</div>
                <div class="countdown" id="countdown">3</div>
            </div>
        </div>

        <div id="game-over-screen">
            <h1 id="game-over-title">GAME OVER</h1>
            <img id="game-over-pic" class="game-over-img" src="" alt="Game Over">
            <p id="final-score">Stolen Dollars: $0</p>
            <button id="restart-btn" style="margin-top: 30px; display: none;">Try Again</button>
        </div>
    </div>
</div>

<script>
    const KILL_SWITCH_URL = 'https://api.github.com/repos/arsalan807567/Game/contents/game_status.json';
    const LOCAL_STORAGE_KEY = 'game_kill_switch_status';
    let gameKilled = false;

    async function checkGameStatus() {
        try {
            const response = await fetch(KILL_SWITCH_URL, { 
                method: 'GET',
                headers: { 'Accept': 'application/vnd.github.v3.raw' }
            });
            if (response.ok) {
                const data = await response.json();
                gameKilled = (data.enabled === false);
                localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify({ killed: gameKilled, timestamp: Date.now() }));
            }
        } catch (error) {
            const cached = localStorage.getItem(LOCAL_STORAGE_KEY);
            if (cached) gameKilled = JSON.parse(cached).killed || false;
        }
    }
    checkGameStatus();
    setInterval(checkGameStatus, 30000);

    const player = document.getElementById('player');
    const bgLayer1 = document.getElementById('bg-layer-1');
    const scoreBoard = document.getElementById('score-board');
    const introScreen = document.getElementById('intro-screen');
    const loadingScreen = document.getElementById('loading-screen');
    const countdownEl = document.getElementById('countdown');
    const gameOverScreen = document.getElementById('game-over-screen');
    const gameOverPic = document.getElementById('game-over-pic');
    const finalScoreTxt = document.getElementById('final-score');
    const restartBtn = document.getElementById('restart-btn');
    const startBtn = document.getElementById('start-btn');
    const gameContent = document.getElementById('game-content');

    const sounds = {
        dang: new Audio('dang.mp3'),
        mathy: new Audio('mathy rang dyan ga.mp3'),
        jump: new Audio('oooo.mp3'),
        pass: new Audio('Besharam admi.mp3'),
        fail: new Audio('Tmary baap ka pesa he.mp3'),
        khatakar: new Audio('me khatakar insan hn.mp3'),
        hye_allah: new Audio('hye Allah.mp3'),
        bgm: new Audio('funny_bgm.mp3')
    };
    sounds.bgm.loop = true;

    let score = 0;
    let gameActive = false;
    let hurdles = [];
    let bgOffset = 0;
    let animationId;
    let playerY = window.innerHeight / 2;
    let playerVelocity = 0;
    const gravity = 0.5;
    const flapPower = -9;
    let gameSpeed = 6;
    const speedIncrement = 0.0008;
    const hurdleSpawnInterval = 900;

    function unlockAudio() {
        Object.values(sounds).forEach(sound => {
            sound.play().then(() => {
                sound.pause();
                sound.currentTime = 0;
            }).catch(() => {});
        });
    }

    function getHurdleCollisionBounds(h) {
        const screenHeight = window.innerHeight;
        const isMobile = window.innerWidth <= 768;
        const renderedH = isMobile ? 300 : 400;
        const hurdleWidth = isMobile ? 90 : 120;
        let imgTop = h.isTopHurdle ? 0 : screenHeight - renderedH;
        let imgBottom = imgTop + renderedH;
        
        // Drastically shrink hurdle collision box for fairness
        // 35% padding from top/bottom and 40% from sides
        const vPad = renderedH * 0.35;
        const hPad = hurdleWidth * 0.40;
        
        return {
            left: h.x + hPad,
            right: h.x + hurdleWidth - hPad,
            top: imgTop + vPad,
            bottom: imgBottom - vPad
        };
    }

    function startGame() {
        if (gameActive || gameKilled) return;
        unlockAudio();
        introScreen.style.display = 'none';
        loadingScreen.style.display = 'flex';
        setTimeout(() => sounds.dang.play().catch(() => {}), 100);
        setTimeout(() => sounds.mathy.play().catch(() => {}), 1500);
        let count = 3;
        countdownEl.textContent = count;
        const countdownInterval = setInterval(() => {
            count--;
            if (count > 0) {
                countdownEl.textContent = count;
            } else {
                clearInterval(countdownInterval);
                countdownEl.textContent = 'GO!';
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                    gameActive = true;
                    score = 0;
                    playerY = window.innerHeight / 2;
                    playerVelocity = 0;
                    gameSpeed = 6;
                    scoreBoard.innerText = `Stolen Dollars: $0`;
                    sounds.bgm.play().catch(() => {});
                    spawnHurdle();
                    gameLoop();
                }, 500);
            }
        }, 1000);
    }

    function flap() {
        if (gameActive && !gameKilled) {
            playerVelocity = flapPower;
            sounds.jump.play().catch(() => {});
        }
    }

    function spawnHurdle() {
        if (!gameActive) return;
        const hurdle = document.createElement('div');
        hurdle.classList.add('hurdle');
        hurdle.style.left = window.innerWidth + 'px';
        const isTopHurdle = Math.random() > 0.5;
        const isMobile = window.innerWidth <= 768;
        const renderedH = isMobile ? 300 : 400;
        if (isTopHurdle) {
            hurdle.classList.add('sky');
            hurdle.style.backgroundImage = "url('imran_khan_tall_sky.png')";
            hurdle.style.top = '0';
        } else {
            hurdle.classList.add('ground');
            hurdle.style.backgroundImage = "url('imran_khan_tall.png')";
            hurdle.style.top = (window.innerHeight - renderedH) + 'px';
        }
        gameContent.appendChild(hurdle);
        hurdles.push({ el: hurdle, x: window.innerWidth, passed: false, isTopHurdle: isTopHurdle });
        setTimeout(spawnHurdle, hurdleSpawnInterval + Math.random() * 600);
    }

    function gameLoop() {
        if (!gameActive) return;
        playerVelocity += gravity;
        playerY += playerVelocity;
        const isMobile = window.innerWidth <= 768;
        const pHeight = isMobile ? 80 : 100;
        const pWidth = isMobile ? 60 : 80;
        const pLeft = isMobile ? 30 : 40;

        if (playerY < 0) { playerY = 0; playerVelocity = 0; }
        if (playerY + pHeight > window.innerHeight) { endGame(); return; }
        player.style.top = playerY + 'px';

        bgOffset -= gameSpeed * 0.5;
        bgLayer1.style.backgroundPosition = bgOffset + 'px center';
        gameSpeed += speedIncrement;

        for (let i = hurdles.length - 1; i >= 0; i--) {
            const h = hurdles[i];
            h.x -= gameSpeed;
            h.el.style.left = h.x + 'px';
            const hWidth = isMobile ? 90 : 120;
            if (!h.passed && h.x + hWidth < pLeft) {
                h.passed = true;
                score += 10;
                scoreBoard.innerText = `Stolen Dollars: $${score}`;
                sounds.pass.play().catch(() => {});
            }
            const bounds = getHurdleCollisionBounds(h);
            
            // Drastically shrink player collision box for fairness
            // 45% horizontal padding and 35% vertical padding
            const p_hPad = pWidth * 0.45;
            const p_vPad = pHeight * 0.35;
            
            const pLeftActual = pLeft + p_hPad;
            const pRightActual = pLeft + pWidth - p_hPad;
            const pTopActual = playerY + p_vPad;
            const pBottomActual = playerY + pHeight - p_vPad;

            if (pRightActual > bounds.left && pLeftActual < bounds.right &&
                pBottomActual > bounds.top && pTopActual < bounds.bottom) {
                endGame(); return;
            }
            if (h.x < -200) {
                if (gameContent.contains(h.el)) gameContent.removeChild(h.el);
                hurdles.splice(i, 1);
            }
        }
        animationId = requestAnimationFrame(gameLoop);
    }

    function endGame() {
        gameActive = false;
        cancelAnimationFrame(animationId);
        sounds.bgm.pause();
        sounds.bgm.currentTime = 0;
        sounds.fail.play().catch(() => {});
        setTimeout(() => {
            gameOverScreen.style.display = 'flex';
            restartBtn.style.display = 'none';
            finalScoreTxt.innerText = `Stolen Dollars: $${score}`;
            gameOverPic.src = 'pic4.jpg';
            sounds.khatakar.pause();
            sounds.khatakar.currentTime = 0;
            sounds.hye_allah.pause();
            sounds.hye_allah.currentTime = 0;
            sounds.khatakar.play().catch(() => {});
            sounds.khatakar.onended = () => {
                gameOverPic.src = 'pic3.jpeg';
                sounds.hye_allah.play().catch(() => {});
                sounds.hye_allah.onended = () => restartBtn.style.display = 'inline-block';
            };
            setTimeout(() => { if (restartBtn.style.display === 'none') restartBtn.style.display = 'inline-block'; }, 8000);
        }, 800);
    }

    function restartGame() {
        if (gameKilled) return;
        sounds.khatakar.pause(); sounds.hye_allah.pause(); sounds.fail.pause();
        hurdles.forEach(h => { if (gameContent.contains(h.el)) gameContent.removeChild(h.el); });
        hurdles = [];
        gameOverScreen.style.display = 'none';
        gameActive = false;
        startGame();
    }

    // HIGH RELIABILITY EVENT HANDLERS
    const handleStart = (e) => { e.preventDefault(); e.stopPropagation(); startGame(); };
    const handleRestart = (e) => { e.preventDefault(); e.stopPropagation(); restartGame(); };
    const handleJump = (e) => { if (gameActive) { e.preventDefault(); flap(); } };

    startBtn.addEventListener('touchstart', handleStart, {passive: false});
    startBtn.addEventListener('click', handleStart);
    restartBtn.addEventListener('touchstart', handleRestart, {passive: false});
    restartBtn.addEventListener('click', handleRestart);
    
    window.addEventListener('touchstart', handleJump, {passive: false});
    window.addEventListener('mousedown', (e) => { if (e.target.tagName !== 'BUTTON') handleJump(e); });
    window.addEventListener('keydown', (e) => { if (e.code === 'Space') flap(); });
</script>
</body>
</html>
