<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thief Escape Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Arial', sans-serif;
            touch-action: manipulation;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 70%, #8B4513 70%, #A0522D 100%);
        }
        #player {
            position: absolute;
            width: 120px;
            height: 120px;
            bottom: 25%;
            left: 50px;
            background-image: url('thief_v2.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 10;
            animation: run 0.6s steps(2) infinite;
        }
        @keyframes run {
            0% { transform: scaleX(1); }
            50% { transform: scaleX(1); }
            100% { transform: scaleX(1); }
        }
        .hurdle {
            position: absolute;
            width: 100px;
            height: 200px;
            background-image: url('hurdle_v2.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 5;
        }
        #intro-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
            text-align: center;
        }
        .vs-container {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .circle-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid white;
            background-size: cover;
            background-position: center;
        }
        .vs-text {
            font-size: 48px;
            font-weight: bold;
            color: #ff4500;
            text-shadow: 2px 2px 4px #000;
        }
        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 95;
            color: white;
        }
        .loading-text {
            font-size: 24px;
            margin-bottom: 20px;
        }
        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #score-board {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 4px #000;
            z-index: 50;
        }
        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 110;
            color: white;
        }
        .game-over-img {
            width: 250px;
            height: auto;
            margin-bottom: 20px;
            border: 5px solid #fff;
            border-radius: 10px;
        }
        button {
            padding: 15px 30px;
            font-size: 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="score-board">Stolen Dollars: $0</div>
    <div id="player"></div>

    <div id="intro-screen">
        <h1>Thief Escape</h1>
        <div class="vs-container">
            <div class="circle-img" style="background-image: url('thief_v2.png');"></div>
            <div class="vs-text">VS</div>
            <div class="circle-img" style="background-image: url('hurdle_v2.png');"></div>
        </div>
        <p>Press Space or Tap to Jump!</p>
        <button onclick="startGame()">Start Game</button>
    </div>

    <div id="loading-screen">
        <div class="loading-text">Get Ready...</div>
        <div class="loading-spinner"></div>
    </div>

    <div id="game-over-screen">
        <h1 id="game-over-title">GAME OVER</h1>
        <img id="game-over-pic" class="game-over-img" src="" alt="Game Over">
        <p id="final-score">Stolen Dollars: $0</p>
        <button onclick="restartGame()">Try Again</button>
    </div>
</div>

<script>
    const player = document.getElementById('player');
    const gameContainer = document.getElementById('game-container');
    const scoreBoard = document.getElementById('score-board');
    const introScreen = document.getElementById('intro-screen');
    const loadingScreen = document.getElementById('loading-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    const gameOverPic = document.getElementById('game-over-pic');
    const finalScoreTxt = document.getElementById('final-score');

    // Audio assets
    const sounds = {
        dang: new Audio('dang.mp3'),
        mathy: new Audio('mathy rang dyan ga.mp3'),
        jump: new Audio('oooo.mp3'),
        pass: new Audio('Besharam admi.mp3'),
        fail: new Audio('Tmary baap ka pesa he.mp3'),
        khatakar: new Audio('me khatakar insan hn.mp3'),
        bgm: new Audio('funny_bgm.mp3')
    };
    sounds.bgm.loop = true;

    let isJumping = false;
    let gravity = 0.5;
    let score = 0;
    let gameActive = false;
    let hurdles = [];
    let animationId;
    let playerY = 0;
    let playerVelocity = 0;
    let groundY = window.innerHeight * 0.75 - 120;

    function startGame() {
        introScreen.style.display = 'none';
        loadingScreen.style.display = 'flex';
        
        // Intro sequence with loading
        sounds.dang.play();
        
        setTimeout(() => {
            sounds.mathy.play();
        }, 1500);

        setTimeout(() => {
            loadingScreen.style.display = 'none';
            gameActive = true;
            score = 0;
            updateScore();
            sounds.bgm.play();
            spawnHurdle();
            gameLoop();
        }, 4000);
    }

    function jump() {
        if (!isJumping && gameActive) {
            isJumping = true;
            playerVelocity = -12;
            sounds.jump.play();
        }
    }

    function updateScore() {
        scoreBoard.innerText = `Stolen Dollars: $${score}`;
    }

    function spawnHurdle() {
        if (!gameActive) return;

        const hurdle = document.createElement('div');
        hurdle.classList.add('hurdle');
        
        // Randomly place from sky or ground
        const isSky = Math.random() > 0.5;
        hurdle.style.left = window.innerWidth + 'px';
        
        if (isSky) {
            hurdle.style.top = '50px';
        } else {
            hurdle.style.top = (window.innerHeight * 0.75 - 200) + 'px';
        }

        gameContainer.appendChild(hurdle);
        hurdles.push({
            el: hurdle,
            x: window.innerWidth,
            y: isSky ? 50 : (window.innerHeight * 0.75 - 200),
            isSky: isSky,
            passed: false
        });

        const nextSpawn = 1800 + Math.random() * 1500;
        setTimeout(spawnHurdle, nextSpawn);
    }

    function gameLoop() {
        if (!gameActive) return;

        // Player physics
        playerVelocity += gravity;
        playerY += playerVelocity;

        // Ground collision
        if (playerY >= 0) {
            playerY = 0;
            playerVelocity = 0;
            isJumping = false;
        }

        player.style.transform = `translateY(${playerY}px)`;

        // Move hurdles
        for (let i = hurdles.length - 1; i >= 0; i--) {
            const h = hurdles[i];
            h.x -= 6 + (score / 150);
            h.el.style.left = h.x + 'px';

            // Check if passed
            if (!h.passed && h.x < 50) {
                h.passed = true;
                score += 10;
                updateScore();
                sounds.pass.play();
            }

            // Improved collision detection with padding
            const playerRect = {
                left: 50 + 20,
                right: 50 + 100 - 20,
                top: window.innerHeight * 0.75 - 120 + playerY + 20,
                bottom: window.innerHeight * 0.75 - 120 + playerY + 100 - 20
            };

            const hurdleRect = {
                left: h.x + 15,
                right: h.x + 100 - 15,
                top: h.y + 20,
                bottom: h.y + 200 - 20
            };

            if (
                playerRect.left < hurdleRect.right &&
                playerRect.right > hurdleRect.left &&
                playerRect.top < hurdleRect.bottom &&
                playerRect.bottom > hurdleRect.top
            ) {
                endGame();
            }

            // Remove off-screen hurdles
            if (h.x < -150) {
                gameContainer.removeChild(h.el);
                hurdles.splice(i, 1);
            }
        }

        animationId = requestAnimationFrame(gameLoop);
    }

    function endGame() {
        gameActive = false;
        cancelAnimationFrame(animationId);
        sounds.bgm.pause();
        sounds.fail.play();
        
        setTimeout(() => {
            gameOverScreen.style.display = 'flex';
            finalScoreTxt.innerText = `Stolen Dollars: $${score}`;
            
            // Picture logic for game over
            gameOverPic.src = 'pic4.jpg';
            sounds.khatakar.play();
            
            // After 4 seconds show pic3
            setTimeout(() => {
                gameOverPic.src = 'pic3.jpeg';
            }, 4000);
        }, 800);
    }

    function restartGame() {
        // Clear existing hurdles
        hurdles.forEach(h => {
            if (gameContainer.contains(h.el)) {
                gameContainer.removeChild(h.el);
            }
        });
        hurdles = [];
        playerY = 0;
        playerVelocity = 0;
        sounds.bgm.pause();
        sounds.bgm.currentTime = 0;
        gameOverScreen.style.display = 'none';
        startGame();
    }

    // Controls
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            e.preventDefault();
            jump();
        }
    });
    window.addEventListener('touchstart', (e) => {
        e.preventDefault();
        jump();
    });
    window.addEventListener('mousedown', jump);

</script>
</body>
</html>
